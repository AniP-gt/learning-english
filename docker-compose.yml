services:
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: learning-english-web
    ports:
      - "3000:3000"
    volumes:
      - ${LEARNING_DATA_DIR}:/app/data:ro
    env_file: .env
    environment:
      - NODE_ENV=development
    networks:
      - learning-net

networks:
  learning-net:
    driver: bridge

volumes:
  learning-data:
